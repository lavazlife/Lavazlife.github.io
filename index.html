<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Prompt Generator</title>
    <style>
        :root {
            --bg-color: #202124;
            --surface-color: #2d2e31;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #f8fafc;
            --text-muted: #9ca3af;
            --border-color: #4b5563;
            --error-color: #ef4444;
            --focus-ring: rgba(79, 70, 229, 0.4);
            --radius: 8px;
            --font-family: system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        /* Updated Media Showcase for 2x2 Grid */
        .media-showcase {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 480px; /* Constrains the grid width */
            margin: 0 auto 30px auto;
        }

        .media-showcase video {
            width: 100%;
            height: 140px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            object-fit: cover;
            background: #000;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface-color);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        section {
            margin-bottom: 24px;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            background-color: #3b3c40;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: var(--font-family);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        input.error-border {
            border-color: var(--error-color);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--text-main);
            background: transparent;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .checkbox-item input {
            cursor: pointer;
        }

        .advanced-settings {
            background-color: #28292c;
            padding: 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #3b3c40;
            color: var(--text-main);
        }

        #error-box {
            display: none;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--error-color);
            font-size: 0.9rem;
        }

        .output-section {
            margin-top: 40px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            background-color: #1a1a1c;
            color: #10b981;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            resize: vertical;
            line-height: 1.6;
        }

        .btn-copy {
            background-color: #10b981;
            color: white;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-copy:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Website Prompt Generator</h1>
        <p>Design your site, generate the perfect prompt, build with AI.</p>
        
        <div class="media-showcase">
            <video src="35179a1a-9fb0-4efe-8ad5-ad7ca66c4cca-1_all_8643.mp4" autoplay loop muted playsinline aria-label="R. Bedford Logo"></video>
            <video src="25159.mp4" autoplay loop muted playsinline aria-label="LAVA Logo"></video>
            <video src="23531.mp4" autoplay loop muted playsinline aria-label="LL Lavaz Designs"></video>
            <video src="22798.mp4" autoplay loop muted playsinline aria-label="Russell B Profile"></video>
        </div>
    </header>

    <main>
        <div id="error-box">Please fill out all required fields highlighted in red.</div>

        <form id="prompt-form" novalidate>
            <section>
                <h2>Core Details</h2>
                <div class="form-grid">
                    <div>
                        <label for="website-type">Website Type *</label>
                        <select id="website-type" required>
                            <option value="">Select a type...</option>
                            <option value="Landing page">Landing page</option>
                            <option value="Portfolio">Portfolio</option>
                            <option value="Blog">Blog</option>
                            <option value="SaaS product site">SaaS product site</option>
                            <option value="E-commerce store">E-commerce store</option>
                            <option value="Documentation site">Documentation site</option>
                        </select>
                    </div>
                    <div>
                        <label for="industry">Industry / Niche *</label>
                        <input type="text" id="industry" placeholder="e.g., Fitness, Tech Startup, Photography" required>
                    </div>
                    <div class="full-width">
                        <label for="target-audience">Target Audience *</label>
                        <input type="text" id="target-audience" placeholder="e.g., Small business owners, young adults" required>
                    </div>
                    <div class="full-width">
                        <label for="primary-goal">Primary Goal *</label>
                        <input type="text" id="primary-goal" placeholder="e.g., Collect email leads, sell products, showcase work" required>
                    </div>
                </div>
            </section>

            <section>
                <h2>Content & Design</h2>
                <div class="form-grid">
                    <div class="full-width">
                        <label>Sections to Include</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Hero section"> Hero</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Navigation bar"> Navbar</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Pricing tables"> Pricing</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="FAQ section"> FAQ</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Testimonials"> Testimonials</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Contact form"> Contact Form</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Footer"> Footer</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Blog feed"> Blog Feed</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Feature grid"> Feature Grid</label>
                            <label class="checkbox-item"><input type="checkbox" name="sections" value="Image gallery"> Gallery</label>
                        </div>
                    </div>
                    <div class="full-width">
                        <label for="style-prefs">Design & Style Preferences</label>
                        <input type="text" id="style-prefs" placeholder="e.g., Minimalist, dark mode, glassmorphism, neo-brutalism">
                    </div>
                    <div>
                        <label for="tone-voice">Tone of Voice</label>
                        <select id="tone-voice">
                            <option value="Professional and trustworthy">Professional</option>
                            <option value="Friendly and approachable">Friendly</option>
                            <option value="Playful and creative">Playful</option>
                            <option value="Luxury and high-end">Luxury</option>
                            <option value="Technical and precise">Technical</option>
                        </select>
                    </div>
                    <div>
                        <label for="tech-stack">Tech Stack Preference</label>
                        <select id="tech-stack">
                            <option value="Pure HTML/CSS/JS (no external libraries)">Pure HTML/CSS/JS</option>
                            <option value="React + Tailwind CSS">React + Tailwind</option>
                            <option value="Next.js + Tailwind CSS">Next.js + Tailwind</option>
                            <option value="Vue + CSS modules">Vue + CSS modules</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="advanced-settings">
                <h2>Advanced Settings</h2>
                <div class="form-grid">
                    <div class="full-width">
                        <label class="checkbox-item" style="border: none; padding: 0; background: transparent;">
                            <input type="checkbox" id="accessibility"> 
                            Enforce WCAG accessibility compliance (ARIA labels, high contrast, keyboard navigation)
                        </label>
                    </div>
                    <div class="full-width">
                        <label for="seo-keywords">SEO Keywords</label>
                        <input type="text" id="seo-keywords" placeholder="e.g., Best web design, affordable marketing">
                    </div>
                    <div class="full-width">
                        <label class="checkbox-item" style="border: none; padding: 0; background: transparent;">
                            <input type="checkbox" id="performance"> 
                            Optimize for fast load times and minimal external dependencies
                        </label>
                    </div>
                    <div class="full-width">
                        <label>Code Output Preferences</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="code-prefs" value="Include detailed inline comments explaining the code"> Include comments</label>
                            <label class="checkbox-item"><input type="checkbox" name="code-prefs" value="Provide a brief structural breakdown after the code blocks"> Explain structure</label>
                            <label class="checkbox-item"><input type="checkbox" name="code-prefs" value="Split code into separate files (e.g., index.html, styles.css, app.js)"> Split into files</label>
                        </div>
                    </div>
                </div>
            </section>

            <div class="btn-group">
                <button type="button" class="btn-secondary" id="btn-reset">Reset Form</button>
                <button type="submit" class="btn-primary">Generate Prompt</button>
            </div>
        </form>

        <section id="output-container" class="output-section">
            <div class="output-header">
                <h2>Generated Prompt</h2>
                <button type="button" class="btn-copy" id="btn-copy">Copy to Clipboard</button>
            </div>
            <textarea id="prompt-output" readonly></textarea>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('prompt-form');
            const errorBox = document.getElementById('error-box');
            const outputContainer = document.getElementById('output-container');
            const promptOutput = document.getElementById('prompt-output');
            const btnCopy = document.getElementById('btn-copy');
            const btnReset = document.getElementById('btn-reset');

            const requiredFields = ['website-type', 'industry', 'target-audience', 'primary-goal'];

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;

                requiredFields.forEach(id => {
                    const el = document.getElementById(id);
                    if (!el.value.trim()) {
                        el.classList.add('error-border');
                        isValid = false;
                    } else {
                        el.classList.remove('error-border');
                    }
                });

                if (!isValid) {
                    errorBox.style.display = 'block';
                    return;
                }
                
                errorBox.style.display = 'none';

                const type = document.getElementById('website-type').value;
                const industry = document.getElementById('industry').value;
                const audience = document.getElementById('target-audience').value;
                const goal = document.getElementById('primary-goal').value;
                const style = document.getElementById('style-prefs').value || 'Clean, modern, and user-friendly';
                const tone = document.getElementById('tone-voice').value;
                const tech = document.getElementById('tech-stack').value;
                const seo = document.getElementById('seo-keywords').value || 'None specified';
                
                const sectionsNode = document.querySelectorAll('input[name="sections"]:checked');
                const sectionsArr = Array.from(sectionsNode).map(cb => `- ${cb.value}`);
                const sections = sectionsArr.length > 0 ? sectionsArr.join('\n') : '- Standard semantic layout';

                const isAccessible = document.getElementById('accessibility').checked ? 'Strict adherence to WCAG accessibility guidelines.' : 'Standard web accessibility practices.';
                const isPerformant = document.getElementById('performance').checked ? 'Highly optimized for performance, fast paint times, and minimal bloat.' : 'Standard performance optimization.';
                
                const prefsNode = document.querySelectorAll('input[name="code-prefs"]:checked');
                const prefsArr = Array.from(prefsNode).map(cb => `- ${cb.value}`);
                const codePrefs = prefsArr.length > 0 ? prefsArr.join('\n') : '- Provide raw code ready for copy-pasting';

                const finalPrompt = `You are a senior full-stack web developer and UX designer.

<context>
I need you to create a complete WEBSITE for a ${type} in the ${industry} space, targeting ${audience}. 
The primary goal of the site is to ${goal}.
</context>

<task>
Generate production-ready code for a fully responsive website.
Include the following sections:
${sections}

Use a design style that feels: ${style}.
Use a tone of voice that is: ${tone}.
</task>

<constraints>
Tech stack: ${tech}.
Accessibility: ${isAccessible}
SEO: Focus on these keywords: ${seo}.
Performance: ${isPerformant}
Follow best practices for semantic HTML, clear content hierarchy, and modern layout.
</constraints>

<output_format>
Return ONLY code blocks and minimal explanations based on these preferences:
${codePrefs}

If using a framework, separate the code by file with clear headings.
Ensure the final output can be copied directly into a project with minimal modification.
</output_format>`;

                promptOutput.value = finalPrompt;
                outputContainer.style.display = 'block';
                outputContainer.scrollIntoView({ behavior: 'smooth' });
            });

            btnCopy.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(promptOutput.value);
                    const originalText = btnCopy.textContent;
                    btnCopy.textContent = 'Copied!';
                    btnCopy.style.backgroundColor = '#059669';
                    setTimeout(() => {
                        btnCopy.textContent = originalText;
                        btnCopy.style.backgroundColor = '';
                    }, 2000);
                } catch (err) {
                    alert('Failed to copy to clipboard.');
                }
            });

            btnReset.addEventListener('click', () => {
                form.reset();
                errorBox.style.display = 'none';
                outputContainer.style.display = 'none';
                requiredFields.forEach(id => document.getElementById(id).classList.remove('error-border'));
            });

            requiredFields.forEach(id => {
                document.getElementById(id).addEventListener('input', function() {
                    this.classList.remove('error-border');
                });
            });
        });
    </script>
</body>
</html>
