name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📁 Prepare Web Directory (Fix for webDir)
        run: |
          # Create a safe folder for Capacitor
          mkdir www
          # Copy all web files into it (ignoring unnecessary hidden files/folders)
          rsync -av --exclude='node_modules' --exclude='android' --exclude='.git' --exclude='.github' --exclude='www' . www/
          # Safely update the capacitor config to point to this new folder
          sed -i 's/"webDir": *"[^"]*"/"webDir": "www"/g' capacitor.config.json

      - name: 🤖 Add/Sync Android Project
        run: |
          npx cap add android || npx cap sync android

      - name: 🛠️ Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lava-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
